name: promptfoo-eval

on:
    pull_request:
    push:
        branches: [main]

jobs:
    eval:
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install deps
              run: npm ci

            - name: Run stable Promptfoo eval
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                  PROMPTFOO_DISABLE_TELEMETRY: 1
              run: |
                  mkdir -p .promptfoo
                  npx promptfoo eval --no-cache \
                    --output .promptfoo/results-stable.json

            - name: Print stable Promptfoo summary
              run: |
                  jq '{
                    passed: .summary.testPassCount,
                    failed: .summary.testFailCount,
                    errors: .summary.testErrorCount,
                    total: .summary.testCount
                    }' .promptfoo/results-stable.json

            - name: Run expected-failure demos
              if: always()
              continue-on-error: true
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                  PROMPTFOO_DISABLE_TELEMETRY: 1
              run: |
                  mkdir -p .promptfoo
                  npx promptfoo eval -c promptfooconfig.failures.yaml --no-cache \
                    --output .promptfoo/results-failures.json

            - name: Print expected-failure summary
              if: always()
              run: |
                  if [ -f .promptfoo/results-failures.json ]; then
                    jq '{
                      passed: .summary.testPassCount,
                      failed: .summary.testFailCount,
                      errors: .summary.testErrorCount,
                      total: .summary.testCount
                      }' .promptfoo/results-failures.json
                  else
                    echo "No expected-failure results were generated."
                  fi

            - name: Run model-version regression
              if: always()
              continue-on-error: true
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
                  PROMPTFOO_DISABLE_TELEMETRY: 1
              run: |
                  mkdir -p .promptfoo
                  npx promptfoo eval -c promptfooconfig.model-regression.yaml --no-cache \
                    --output .promptfoo/results-model-regression.json

            - name: Print model-version regression summary
              if: always()
              run: |
                  if [ -f .promptfoo/results-model-regression.json ]; then
                    jq '{
                      passed: .summary.testPassCount,
                      failed: .summary.testFailCount,
                      errors: .summary.testErrorCount,
                      total: .summary.testCount
                      }' .promptfoo/results-model-regression.json
                  else
                    echo "No model-regression results were generated."
                  fi

            - name: Upload results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: promptfoo-results
                  path: |
                      .promptfoo/results-stable.json
                      .promptfoo/results-failures.json
                      .promptfoo/results-model-regression.json
                      .promptfoo/logs/**
                  if-no-files-found: ignore
